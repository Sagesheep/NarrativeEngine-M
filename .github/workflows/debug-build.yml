name: debug-build

on:
  push:
    branches: [refactor/architecture-isolation]
  workflow_dispatch:

concurrency:
  group: debug-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      # Generate src/data/nameBank.json + nameBlocklist.json from the asset pipeline.
      # Source assets live under Upgrade/FablePlans/assets/clean; if they are absent
      # (e.g. not committed on CI) the step is allowed to fail so the typecheck can
      # still proceed against the JSON module declarations in src/json.d.ts.
      - name: Generate name bank assets
        run: node scripts/buildNameBank.mjs
        continue-on-error: true

      - name: Typecheck + Build
        id: build
        run: npm run build

      - name: Lint (report only, non-blocking)
        if: always()
        id: lint
        run: npm run lint
        continue-on-error: true

      - name: Report status
        if: always()
        run: |
          if [ "${{ steps.build.outcome }}" = "success" ]; then
            echo "::notice title=BUILD OK::debug-build passed on ${{ github.ref }}"
            if [ "${{ steps.lint.outcome }}" != "success" ]; then
              echo "::warning title=LINT WARNINGS::build passed but lint reported issues (non-blocking)"
            fi
          else
            echo "::error title=BUILD FAILED::debug-build failed on ${{ github.ref }}"
            exit 1
          fi
